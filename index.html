<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 影片與雙語字幕合併工具 (GitHub Pages 終極定製版)</title>
    
    <!-- 確保跨域隔離環境，讓 FFmpeg.wasm 能正常編寫記憶體 -->
    <script src="coi-serviceworker.js"></script>
    
    <!-- 載入 FFmpeg.wasm 核心 -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #0f172a; font-size: 24px; margin-bottom: 20px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            padding: 12px 20px;
            background-color: #0284c7;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            box-sizing: border-box;
        }
        .btn:hover { background-color: #0369a1; }
        .btn-disabled {
            background-color: #cbd5e1 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
        input[type="file"] { display: none; }
        .file-status { font-size: 13px; color: #64748b; margin-top: -5px; margin-bottom: 5px; }
        #status { margin-top: 25px; font-weight: 600; font-size: 15px; min-height: 40px; white-space: pre-line; }
        .progress-bar {
            width: 100%;
            background-color: #e2e8f0;
            padding: 4px;
            border-radius: 9999px;
            margin-top: 20px;
            display: none;
            box-sizing: border-box;
        }
        .progress-bar-fill {
            display: block;
            height: 12px;
            background-color: #10b981;
            border-radius: 9999px;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 影片與雙語字幕合併工具</h1>
    <p>將您的雙語 SRT 字幕永久燒錄進影片中。本版本已將中文字型精準對準您倉庫中的微軟正黑體細體 (msjhl.ttc)。</p>
    
    <div class="upload-group">
        <label class="btn" for="videoUploader">📁 1. 選擇影片檔案 (MP4/MKV/MOV)</label>
        <input type="file" id="videoUploader" accept="video/*">
        <div class="file-status" id="videoName">尚未選取影片</div>

        <label class="btn" for="srtUploader">📁 2. 選擇雙語 SRT 字幕檔</label>
        <input type="file" id="srtUploader" accept=".srt">
        <div class="file-status" id="srtName">尚未選取字幕</div>
    </div>

    <button class="btn btn-disabled" id="startBtn" disabled style="width: 100%; font-size: 16px;">🚀 開始合併（硬燒錄字幕）</button>

    <div class="progress-bar" id="progressBar">
        <span class="progress-bar-fill" id="progressBarFill"></span>
    </div>

    <div id="status" style="color: #64748b;">網頁載入中，請稍候...</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    
    const ffmpeg = createFFmpeg({ log: true });

    const videoUploader = document.getElementById('videoUploader');
    const srtUploader = document.getElementById('srtUploader');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressBarFill = document.getElementById('progressBarFill');

    let videoFile = null;
    let srtFile = null;

    // 1. 初始化系統並加載核心
    async function init() {
        status.innerText = '正在初始化 FFmpeg 核心，請稍候...';
        try {
            await ffmpeg.load();
            status.innerText = '✅ 系統就緒！請先選取影片與字幕檔案。';
            status.style.color = '#10b981';
        } catch (e) {
            status.innerText = '❌ 核心載入失敗。\n請確保 coi-serviceworker.js 已推送到 GitHub 且與 index.html 同目錄。\n並請使用 Chrome/Edge 開啟。';
            status.style.color = '#ef4444';
            console.error(e);
        }
    }

    // 監聽檔案選擇
    videoUploader.addEventListener('change', (e) => {
        videoFile = e.target.files[0];
        if(videoFile) {
            document.getElementById('videoName').innerText = `已選取: ${videoFile.name}`;
            checkReady();
        }
    });

    srtUploader.addEventListener('change', (e) => {
        srtFile = e.target.files[0];
        if(srtFile) {
            document.getElementById('srtName').innerText = `已選取: ${srtFile.name}`;
            checkReady();
        }
    });

    function checkReady() {
        if (videoFile && srtFile) {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
            startBtn.style.backgroundColor = '#10b981';
        }
    }

    // 監聽 FFmpeg 進度
    ffmpeg.setProgress(({ ratio }) => {
        const percentage = Math.min(Math.max(Math.round(ratio * 100), 0), 100);
        progressBarFill.style.width = `${percentage}%`;
        status.innerText = `⏳ 正在努力壓制雙語字幕中... ${percentage}% \n(請勿關閉網頁)`;
        status.style.color = '#0284c7';
    });

    // 2. 開始轉檔
    startBtn.addEventListener('click', async () => {
        if (!videoFile || !srtFile) return;

        startBtn.disabled = true;
        startBtn.classList.add('btn-disabled');
        progressBar.style.display = 'block';
        progressBarFill.style.width = '0%';
        status.style.color = '#0f172a';

        const videoIn = 'input' + videoFile.name.substring(videoFile.name.lastIndexOf('.'));
        const srtIn = 'subtitles.srt';
        const fontName = 'msjhl.ttc';  // 💡 已精準對齊您的檔名
        const videoOut = 'output_with_subtitles.mp4';

        try {
            // 💡 使用正確的檔名進行安全非同步抓取
            status.innerText = '💾 正在從您的倉庫下載微軟正黑體細體 (msjhl.ttc)...';
            const fontResponse = await fetch('./msjhl.ttc');
            if (!fontResponse.ok) {
                throw new Error('無法在伺服器上讀取 msjhl.ttc，請確認此字型檔有上傳到與 index.html 相同的資料夾，且注意英文大小寫需完全相符。');
            }
            const fontBuffer = await fontResponse.arrayBuffer();
            ffmpeg.FS('writeFile', fontName, new Uint8Array(fontBuffer));

            // 寫入影片與字幕檔案到虛擬記憶體
            status.innerText = '💾 正在將影片與字幕載入沙盒記憶體...';
            ffmpeg.FS('writeFile', videoIn, await fetchFile(videoFile));
            ffmpeg.FS('writeFile', srtIn, await fetchFile(srtFile));

            status.innerText = '⏳ 初始化壓制引擎（已啟動自動時間戳重構技術）...';

            // ⚡ 強大容錯壓制參數，精準呼叫實體檔名 'msjhl.ttc'
            await ffmpeg.run(
                '-fflags', '+genpts',
                '-i', videoIn,
                '-vf', `subtitles=${srtIn}:fontsdir=.:fontfile='msjhl.ttc':force_style='FontSize=22,Outline=2,PrimaryColour=&HFFFFFF,BorderStyle=1'`,
                '-vcodec', 'libx264',
                '-acodec', 'aac',
                '-pix_fmt', 'yuv420p',
                '-preset', 'superfast',
                videoOut
            );

            status.innerText = '🎉 字幕硬燒錄完成！正在準備下載影片...';
            status.style.color = '#10b981';

            const data = ffmpeg.FS('readFile', videoOut);
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `[帶字幕]_${videoFile.name.substring(0, videoFile.name.lastIndexOf('.'))}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // 清理虛擬記憶體空間
            ffmpeg.FS('unlink', videoIn);
            ffmpeg.FS('unlink', srtIn);
            ffmpeg.FS('unlink', fontName);
            ffmpeg.FS('unlink', videoOut);

            status.innerText = '✅ 字幕合併成功！影片已自動下載至您的電腦。';
        } catch (err) {
            status.innerText = `❌ 壓制失敗。\n錯誤詳情：${err.message || '瀏覽器虛擬記憶體崩潰或格式不相容'}\n請確保您的 SRT 字幕時間軸沒有發生結束時間小於開始時間的逆流錯誤。`;
            status.style.color = '#ef4444';
            console.error(err);
        } finally {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
        }
    });

    init();
</script>

</body>
</html>
