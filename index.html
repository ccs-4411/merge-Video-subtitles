<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 影片與雙語字幕合併工具 (穩定版)</title>
    
    <!-- 啟用跨域隔離，讓 ffmpeg.wasm 可使用 SharedArrayBuffer -->
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #0f172a; font-size: 24px; margin-bottom: 20px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            padding: 12px 20px;
            background-color: #0284c7;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            box-sizing: border-box;
        }
        .btn:hover { background-color: #0369a1; }
        .btn-disabled {
            background-color: #cbd5e1 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
        input[type="file"] { display: none; }
        .file-status { font-size: 13px; color: #64748b; margin-top: -5px; margin-bottom: 5px; }
        #status { margin-top: 25px; font-weight: 600; font-size: 15px; min-height: 40px; white-space: pre-line; }
        .progress-bar {
            width: 100%;
            background-color: #e2e8f0;
            padding: 4px;
            border-radius: 9999px;
            margin-top: 20px;
            display: none;
            box-sizing: border-box;
        }
        .progress-bar-fill {
            display: block;
            height: 12px;
            background-color: #10b981;
            border-radius: 9999px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .warning {
            background-color: #fef9c3;
            border-left: 4px solid #eab308;
            padding: 10px;
            font-size: 13px;
            margin-top: 20px;
            text-align: left;
            color: #854d0e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 影片與雙語字幕合併工具</h1>
    <p>將您的雙語 SRT 字幕永久燒錄進影片中。<br>🔧 本版本已修正 FFmpeg filter 語法錯誤，並移除不穩定的外部字型下載，改用內建字型，確保合併成功。</p>
    
    <div class="upload-group">
        <label class="btn" for="videoUploader">📁 1. 選擇影片檔案 (MP4/MKV/MOV)</label>
        <input type="file" id="videoUploader" accept="video/*">
        <div class="file-status" id="videoName">尚未選取影片</div>

        <label class="btn" for="srtUploader">📁 2. 選擇雙語 SRT 字幕檔 (UTF-8 編碼)</label>
        <input type="file" id="srtUploader" accept=".srt">
        <div class="file-status" id="srtName">尚未選取字幕</div>
    </div>

    <button class="btn btn-disabled" id="startBtn" disabled style="width: 100%; font-size: 16px;">🚀 開始合併（穩定版）</button>

    <div class="progress-bar" id="progressBar">
        <span class="progress-bar-fill" id="progressBarFill"></span>
    </div>

    <div id="status" style="color: #64748b;">網頁載入中，請稍候...</div>
    
    <div class="warning">
        ⚠️ 重要提醒：<br>
        1. 請確保本網頁是透過 <strong>HTTP 伺服器</strong> 執行（例如使用 npx http-server 或 Python http.server），<br>
           否則會因跨域隔離失效而導致 FFmpeg 無法啟動。<br>
        2. 字幕檔案請使用 <strong>UTF-8 編碼</strong>（無 BOM 較佳），以避免亂碼。<br>
        3. 若合併失敗，請開啟瀏覽器開發者工具（F12）查看錯誤訊息。
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    const videoUploader = document.getElementById('videoUploader');
    const srtUploader = document.getElementById('srtUploader');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressBarFill = document.getElementById('progressBarFill');

    let videoFile = null;
    let srtFile = null;

    async function init() {
        status.innerText = '正在初始化 FFmpeg 核心，請稍候...';
        try {
            await ffmpeg.load();
            status.innerText = '✅ 系統就緒！請選取影片與字幕檔案。';
            status.style.color = '#10b981';
        } catch (e) {
            status.innerText = '❌ 核心載入失敗。\n請確認您正在使用 HTTP 伺服器執行本網頁，且 coi-serviceworker.js 存在於同目錄。';
            status.style.color = '#ef4444';
            console.error(e);
        }
    }

    videoUploader.addEventListener('change', (e) => {
        videoFile = e.target.files[0];
        if(videoFile) {
            document.getElementById('videoName').innerText = `已選取: ${videoFile.name}`;
            checkReady();
        }
    });

    srtUploader.addEventListener('change', (e) => {
        srtFile = e.target.files[0];
        if(srtFile) {
            document.getElementById('srtName').innerText = `已選取: ${srtFile.name}`;
            checkReady();
        }
    });

    function checkReady() {
        if (videoFile && srtFile) {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
            startBtn.style.backgroundColor = '#10b981';
        }
    }

    ffmpeg.setProgress(({ ratio }) => {
        const percentage = Math.min(Math.max(Math.round(ratio * 100), 0), 100);
        progressBarFill.style.width = `${percentage}%`;
        status.innerText = `⏳ 正在燒錄雙語字幕... ${percentage}% \n(請保持網頁開啟，大型影片可能需要數分鐘)`;
        status.style.color = '#0284c7';
    });

    // 輔助函式：確保字幕檔案為 UTF-8 字串（避免 BOM 問題）
    async function normalizeSrtContent(file) {
        const text = await file.text(); // 自動以 UTF-8 解讀
        // 移除 BOM (U+FEFF)
        if (text.charCodeAt(0) === 0xFEFF) {
            return text.slice(1);
        }
        return text;
    }

    startBtn.addEventListener('click', async () => {
        if (!videoFile || !srtFile) return;

        startBtn.disabled = true;
        startBtn.classList.add('btn-disabled');
        progressBar.style.display = 'block';
        progressBarFill.style.width = '0%';
        status.style.color = '#0f172a';

        // 定義虛擬檔案名稱
        const videoExt = videoFile.name.substring(videoFile.name.lastIndexOf('.'));
        const videoIn = `input${videoExt}`;
        const srtIn = 'subtitles.srt';
        const videoOut = 'output_with_subtitles.mp4';

        try {
            // 1. 寫入影片檔案（二進位）
            status.innerText = '📂 正在載入影片檔到記憶體...';
            ffmpeg.FS('writeFile', videoIn, await fetchFile(videoFile));

            // 2. 處理字幕編碼並寫入
            status.innerText = '📄 正在處理字幕編碼 (確保 UTF-8)...';
            let srtContent = await normalizeSrtContent(srtFile);
            // 將字幕內容轉為 Uint8Array 寫入，確保正確編碼
            const encoder = new TextEncoder();
            const srtData = encoder.encode(srtContent);
            ffmpeg.FS('writeFile', srtIn, srtData);

            status.innerText = '🎞️ 開始合併字幕與影片 (使用內建字型，穩定模式)...';

            // 3. 執行 FFmpeg 指令
            // 修正重點：
            // - 移除 fontfile 與 fontsdir，使用內建 sans-serif 字型，避免路徑與引號錯誤
            // - 移除 PrimaryColour 中的 & 符號 (預設白色即足夠)
            // - 保留 scale 修正解析度為偶數，防止編碼器崩潰
            // - 加入 -y 覆蓋輸出檔案（若有殘留）
            await ffmpeg.run(
                '-y',                           // 覆蓋輸出檔案
                '-fflags', '+genpts',           // 重建時間戳，解決字幕時間軸異常
                '-i', videoIn,
                '-vf', `scale=trunc(iw/2)*2:trunc(ih/2)*2,subtitles=${srtIn}:force_style='FontSize=20,Outline=2,BorderStyle=1'`,
                '-vcodec', 'libx264',
                '-acodec', 'aac',
                '-pix_fmt', 'yuv420p',
                '-preset', 'superfast',
                '-b:v', '1500k',
                videoOut
            );

            // 4. 檢查輸出檔案是否成功且非空
            const stat = ffmpeg.FS('stat', videoOut);
            if (!stat || stat.size === 0) {
                throw new Error('輸出檔案為 0 KB，可能是 FFmpeg 處理過程中發生錯誤。請檢查瀏覽器控制台。');
            }

            status.innerText = '✅ 字幕燒錄完成！準備下載...';
            status.style.color = '#10b981';

            // 5. 下載檔案
            const data = ffmpeg.FS('readFile', videoOut);
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            const baseName = videoFile.name.substring(0, videoFile.name.lastIndexOf('.')) || 'output';
            downloadLink.download = `[帶字幕]_${baseName}.mp4`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);

            // 6. 清理虛擬檔案
            ffmpeg.FS('unlink', videoIn);
            ffmpeg.FS('unlink', srtIn);
            ffmpeg.FS('unlink', videoOut);

            status.innerText = '🎉 字幕合併成功！影片已開始下載。';
        } catch (err) {
            console.error('合併錯誤:', err);
            status.innerText = `❌ 合併失敗：${err.message || '未知錯誤'}\n請嘗試使用較短的影片或確認字幕檔格式正確。`;
            status.style.color = '#ef4444';
        } finally {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
            progressBarFill.style.width = '0%';
            // 保留進度條顯示，但可隱藏或重置
            setTimeout(() => {
                if (status.innerText.includes('成功') || status.innerText.includes('失敗')) {
                    progressBar.style.display = 'none';
                }
            }, 2000);
        }
    });

    init();
</script>

</body>
</html>
