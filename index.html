<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 影片與雙語字幕合併工具 (網頁版)</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #0f172a; font-size: 24px; margin-bottom: 20px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            padding: 12px 20px;
            background-color: #0284c7;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
        }
        .btn:hover { background-color: #0369a1; }
        .btn-disabled {
            background-color: #cbd5e1 !important;
            cursor: not-allowed;
        }
        input[type="file"] { display: none; }
        .file-status { font-size: 13px; color: #64748b; margin-top: -10px; }
        #status { margin-top: 25px; font-weight: 600; font-size: 15px; }
        .progress-bar {
            width: 100%;
            background-color: #e2e8f0;
            padding: 4px;
            border-radius: 9999px;
            margin-top: 20px;
            display: none;
        }
        .progress-bar-fill {
            display: block;
            height: 12px;
            background-color: #10b981;
            border-radius: 9999px;
            width: 0%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 影片與雙語字幕合併工具</h1>
    <p>將您的雙語 SRT 字幕永久燒錄進影片中。所有壓制過程皆在您瀏覽器本地完成，不消耗任何上傳流量，保護影片隱私！</p>
    
    <div class="upload-group">
        <label class="btn" id="lblVideo">📁 1. 選擇影片檔案 (MP4/MKV/MOV)</label>
        <input type="file" id="videoUploader" accept="video/*">
        <div class="file-status" id="videoName">尚未選取影片</div>

        <label class="btn" id="lblSrt">📁 2. 選擇雙語 SRT 字幕檔</label>
        <input type="file" id="srtUploader" accept=".srt">
        <div class="file-status" id="srtName">尚未選取字幕</div>
    </div>

    <button class="btn btn-disabled" id="startBtn" disabled style="width: 100%; font-size: 16px;">🚀 開始合併（燒錄字幕）</button>

    <div class="progress-bar" id="progressBar">
        <span class="progress-bar-fill" id="progressBarFill"></span>
    </div>

    <div id="status" style="color: #64748b;">網頁載入中，請稍候...</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    // 建立 FFmpeg 實例
    const ffmpeg = createFFmpeg({ log: false });

    // DOM 元素
    const videoUploader = document.getElementById('videoUploader');
    const srtUploader = document.getElementById('srtUploader');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressBarFill = document.getElementById('progressBarFill');

    let videoFile = null;
    let srtFile = null;

    // 1. 初始化系統
    async function init() {
        try {
            await ffmpeg.load();
            status.innerText = '✅ 系統就緒！請先選取影片與字幕檔案。';
            status.style.color = '#10b981';
        } catch (e) {
            status.innerText = '❌ 核心載入失敗，請確認同目錄下是否有 coi-serviceworker.js。';
            status.style.color = '#ef4444';
        }
    }

    // 監聽檔案選擇
    videoUploader.addEventListener('change', (e) => {
        videoFile = e.target.files[0];
        if(videoFile) {
            document.getElementById('videoName').innerText = `已選取: ${videoFile.name}`;
            checkReady();
        }
    });

    srtUploader.addEventListener('change', (e) => {
        srtFile = e.target.files[0];
        if(srtFile) {
            document.getElementById('srtName').innerText = `已選取: ${srtFile.name}`;
            checkReady();
        }
    });

    function checkReady() {
        if (videoFile && srtFile) {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
            startBtn.style.backgroundColor = '#10b981';
        }
    }

    // 監聽 FFmpeg 進度
    ffmpeg.setProgress(({ ratio }) => {
        const percentage = Math.min(Math.max(Math.round(ratio * 100), 0), 100);
        progressBarFill.style.width = `${percentage}%`;
        status.innerText = `⏳ 正在努力壓制字幕中... ${percentage}% (影片越大時間越長)`;
        status.style.color = '#0284c7';
    });

    // 2. 開始轉檔
    startBtn.addEventListener('click', async () => {
        if (!videoFile || !srtFile) return;

        startBtn.disabled = true;
        startBtn.classList.add('btn-disabled');
        progressBar.style.display = 'block';
        progressBarFill.style.width = '0%';
        status.innerText = '正在載入檔案並下載預設字型...';
        status.style.color = '#0f172a';

        const videoIn = 'input' + videoFile.name.substring(videoFile.name.lastIndexOf('.'));
        const srtIn = 'subtitles.srt';
        const videoOut = 'output_with_subtitles.mp4';
        const fontName = 'font.ttf';

        try {
            // 寫入影片與字幕
            ffmpeg.FS('writeFile', videoIn, await fetchFile(videoFile));
            ffmpeg.FS('writeFile', srtIn, await fetchFile(srtFile));

            // ⚡ 關鍵：從網路載入一個極輕量化的開源中文字型（這裡用思源黑體的輕量裁剪版，利於網頁載入）
            // 為了方便演示，這裡使用 cdn 上的輕量字型。若要絕對穩定，可將字型檔下載並放在你自己的 GitHub
            status.innerText = '正在加載中文字型系統（僅首次需要）...';
            ffmpeg.FS('writeFile', fontName, await fetchFile('https://fastly.jsdelivr.net/npm/@fontsource/noto-sans-tc/files/noto-sans-tc-cyrillic-400-normal.woff'));

            status.innerText = '⏳ 初始化壓制引擎（大影片可能需要較長時間處理）...';

            // 執行燒錄指令：
            // 使用 subtitles 濾鏡，並強制指定剛才下載的 font.ttf
            // 為了提升瀏覽器端的轉檔速度，使用 -preset ultrafast (極速編碼)
            await ffmpeg.run(
                '-i', videoIn,
                '-vf', `subtitles=${srtIn}:fontsdir=/:fontname=Noto Sans TC`,
                '-preset', 'ultrafast', 
                '-c:a', 'copy', // 音訊直接複製，不重新編碼以省時間
                videoOut
            );

            status.innerText = '🎉 字幕燒錄完成！正在準備下載影片...';
            status.style.color = '#10b981';

            // 取出影片
            const data = ffmpeg.FS('readFile', videoOut);
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `[帶字幕]_${videoFile.name.substring(0, videoFile.name.lastIndexOf('.'))}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // 清理虛擬記憶體
            ffmpeg.FS('unlink', videoIn);
            ffmpeg.FS('unlink', srtIn);
            ffmpeg.FS('unlink', videoOut);

            status.innerText = '✅ 字幕合併成功！影片已自動下載。';
        } catch (err) {
            status.innerText = '❌ 壓制失敗。原因可能是：影片過大導致瀏覽器記憶體崩潰，或格式不相容。';
            status.style.color = '#ef4444';
            console.error(err);
        } finally {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
        }
    });

    init();
</script>

</body>
</html>
