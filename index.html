<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🎬 雙語字幕合併 - 最終成功版</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: monospace; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 16px; }
        button { background: #3b82f6; border: none; padding: 10px 20px; border-radius: 8px; color: white; cursor: pointer; }
        input { margin: 10px 0; display: block; }
        #log { background: #0f172a; padding: 10px; border-radius: 8px; height: 300px; overflow: auto; font-size: 12px; margin-top: 15px; }
        .status { font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎬 影片 + 雙語字幕合併工具 (保證顯示中文)</h2>
    <input type="file" id="videoFile" accept="video/*">
    <input type="file" id="srtFile" accept=".srt">
    <button id="startBtn">開始合併</button>
    <div class="status" id="status">就緒</div>
    <div id="log">📋 FFmpeg 執行日誌會顯示在這裡</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({
        log: true,
        logger: ({ type, message }) => {
            const logDiv = document.getElementById('log');
            const color = type === 'fferr' ? '#f87171' : '#94a3b8';
            logDiv.innerHTML += `<span style="color:${color}">[${type}] ${message}</span><br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    });

    let videoFile, srtFile;

    document.getElementById('videoFile').onchange = e => videoFile = e.target.files[0];
    document.getElementById('srtFile').onchange = e => srtFile = e.target.files[0];
    document.getElementById('startBtn').onclick = async () => {
        if (!videoFile || !srtFile) return alert('請選取影片和字幕');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = ''; // 清空舊日誌
        startBtn.disabled = true;
        statusDiv.innerText = '初始化 FFmpeg...';

        try {
            await ffmpeg.load();
            statusDiv.innerText = '載入影片...';
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));

            // 處理字幕：移除 BOM，強制 UTF-8
            let srtContent = await srtFile.text();
            if (srtContent.charCodeAt(0) === 0xFEFF) srtContent = srtContent.slice(1);
            srtContent = srtContent.replace(/\r\n/g, '\n');
            ffmpeg.FS('writeFile', 'sub.srt', new TextEncoder().encode(srtContent));

            statusDiv.innerText = '📦 下載中文字型 (思源黑體 TTF) ...';
            // 下載穩定可靠的中文字型 (Noto Sans CJK TC Regular)
            const fontUrl = 'https://github.com/ArtoriaTech/NotoSansCJKTC/raw/master/NotoSansTC-Regular.ttf';
            const fontResp = await fetch(fontUrl);
            if (!fontResp.ok) throw new Error('字型下載失敗');
            const fontBuf = await fontResp.arrayBuffer();
            ffmpeg.FS('writeFile', 'myfont.ttf', new Uint8Array(fontBuf));

            statusDiv.innerText = '🎞️ 開始合併 (使用 subtitles filter + 中文字型) ...';

            // 設定進度 (選擇性)
            ffmpeg.setProgress(({ ratio }) => {
                const percent = Math.round(ratio * 100);
                statusDiv.innerText = `合併中... ${percent}%`;
            });

            // 關鍵指令：fontfile 不加引號，fontsdir 設為當前目錄
            await ffmpeg.run(
                '-y',                       // 覆蓋輸出
                '-fflags', '+genpts',       // 修正時間戳
                '-i', 'input.mp4',
                '-vf', `subtitles=sub.srt:fontsdir=.:fontfile=myfont.ttf:force_style='FontSize=22,Outline=2,BorderStyle=1'`,
                '-c:v', 'libx264',
                '-preset', 'superfast',
                '-crf', '23',
                '-c:a', 'copy',             // 複製音訊，不重新編碼
                'output.mp4'
            );

            const stat = ffmpeg.FS('stat', 'output.mp4');
            if (!stat || stat.size === 0) throw new Error('輸出檔案為 0 KB，請檢查上方日誌中的錯誤');

            statusDiv.innerText = '下載中...';
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `[字幕]_${videoFile.name.replace(/\.[^/.]+$/, '')}.mp4`;
            a.click();
            URL.revokeObjectURL(url);

            // 清理
            ffmpeg.FS('unlink', 'input.mp4');
            ffmpeg.FS('unlink', 'sub.srt');
            ffmpeg.FS('unlink', 'myfont.ttf');
            ffmpeg.FS('unlink', 'output.mp4');

            statusDiv.innerText = '✅ 成功！影片已下載，請檢查雙語字幕是否正常顯示。';
        } catch (err) {
            statusDiv.innerText = `❌ 失敗：${err.message}`;
            console.error(err);
        } finally {
            startBtn.disabled = false;
        }
    };
</script>
</body>
</html>
