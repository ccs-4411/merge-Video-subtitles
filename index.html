<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 雙語字幕合併工具 (真正顯示中文版)</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #0f172a; font-size: 24px; margin-bottom: 20px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .upload-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .btn {
            display: block;
            padding: 12px 20px;
            background-color: #0284c7;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
        }
        .btn:hover { background-color: #0369a1; }
        .btn-disabled { background-color: #cbd5e1 !important; cursor: not-allowed; }
        input[type="file"] { display: none; }
        .file-status { font-size: 13px; color: #64748b; margin-top: -5px; margin-bottom: 5px; }
        #status { margin-top: 25px; font-weight: 600; font-size: 15px; min-height: 40px; white-space: pre-line; }
        .progress-bar { width: 100%; background-color: #e2e8f0; padding: 4px; border-radius: 9999px; margin-top: 20px; display: none; }
        .progress-bar-fill { display: block; height: 12px; background-color: #10b981; border-radius: 9999px; width: 0%; transition: width 0.1s linear; }
        .warning { background-color: #fef9c3; border-left: 4px solid #eab308; padding: 10px; font-size: 13px; margin-top: 20px; text-align: left; color: #854d0e; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎬 影片與雙語字幕合併工具</h1>
    <p>✅ 使用 ASS 字幕動態嵌入 + 中文字型強制載入，<strong>保證雙語字幕顯示</strong>。</p>
    <div class="upload-group">
        <label class="btn" for="videoUploader">📁 1. 選擇影片 (MP4/MKV/MOV)</label>
        <input type="file" id="videoUploader" accept="video/*">
        <div class="file-status" id="videoName">未選取</div>
        <label class="btn" for="srtUploader">📁 2. 選擇 SRT 字幕 (UTF-8)</label>
        <input type="file" id="srtUploader" accept=".srt">
        <div class="file-status" id="srtName">未選取</div>
    </div>
    <button class="btn btn-disabled" id="startBtn" disabled style="width:100%;">🚀 開始合併 (保證顯示)</button>
    <div class="progress-bar" id="progressBar"><span class="progress-bar-fill" id="progressBarFill"></span></div>
    <div id="status">載入中...</div>
    <div class="warning">
        ⚠️ 務必透過 HTTP 伺服器執行 (npx http-server)<br>
        ⚠️ 首次使用會下載中文字型 (~2MB)，請稍等<br>
        ⚠️ 若仍無字幕，請開啟 F12 查看 console 錯誤
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    let videoFile = null, srtFile = null;
    let fontLoaded = false;

    const videoUploader = document.getElementById('videoUploader');
    const srtUploader = document.getElementById('srtUploader');
    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressBarFill');

    async function init() {
        statusDiv.innerText = '⏳ 初始化 FFmpeg...';
        try {
            await ffmpeg.load();
            statusDiv.innerText = '✅ 核心就緒，準備下載字型...';
            await loadFont();
            statusDiv.innerText = '✅ 準備完成，請上傳影片與字幕';
        } catch(e) {
            statusDiv.innerText = '❌ 初始化失敗，請確認 coi-serviceworker.js 存在且使用 HTTP 伺服器';
            console.error(e);
        }
    }

    async function loadFont() {
        if (fontLoaded) return;
        statusDiv.innerText = '📦 下載中文字型 (思源黑體 TTF) ...';
        try {
            // 使用可靠且為 TTF 格式的字型 (Noto Sans TC Regular)
            const fontUrl = 'https://github.com/ArtoriaTech/NotoSansCJKTC/raw/master/NotoSansTC-Regular.ttf';
            const resp = await fetch(fontUrl);
            if (!resp.ok) throw new Error('字型下載失敗');
            const buf = await resp.arrayBuffer();
            ffmpeg.FS('writeFile', 'NotoSansTC-Regular.ttf', new Uint8Array(buf));
            fontLoaded = true;
            statusDiv.innerText = '✅ 中文字型已載入';
        } catch (err) {
            console.warn(err);
            statusDiv.innerText = '⚠️ 字型下載失敗，將嘗試內建字型 (中文可能無法顯示)';
        }
    }

    // 將 SRT 轉換為 ASS 字串，直接指定字型檔案路徑
    function srtToAss(srtText, fontPath = 'NotoSansTC-Regular.ttf') {
        // 移除 BOM
        if (srtText.charCodeAt(0) === 0xFEFF) srtText = srtText.slice(1);
        const lines = srtText.split(/\r?\n/);
        const assEvents = [];
        let i = 0;
        while (i < lines.length) {
            // 跳過空行
            if (lines[i].trim() === '') { i++; continue; }
            const index = lines[i].trim();
            i++;
            if (i >= lines.length) break;
            const timeLine = lines[i].trim();
            i++;
            let textLines = [];
            while (i < lines.length && lines[i].trim() !== '') {
                textLines.push(lines[i].trim());
                i++;
            }
            const text = textLines.join('\\N');
            const timeMatch = timeLine.match(/(\d{2}:\d{2}:\d{2},\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2},\d{3})/);
            if (!timeMatch) continue;
            const start = timeMatch[1].replace(',', '.');
            const end = timeMatch[2].replace(',', '.');
            assEvents.push(`Dialogue: 0,${start},${end},Default,,0,0,0,,${text}`);
        }
        const assHeader = `[Script Info]
ScriptType: v4.00+
PlayResX: 384
PlayResY: 288
WrapStyle: 0

[V4+ Styles]
Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
Style: Default,NotoSansTC-Regular,20,&H00FFFFFF,&H000000FF,&H00000000,&H00000000,0,0,0,0,100,100,0,0,1,2,0,2,10,10,10,1

[Events]
Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
${assEvents.join('\n')}`;
        return assHeader;
    }

    function updateProgress({ ratio }) {
        const percent = Math.min(100, Math.round(ratio * 100));
        progressFill.style.width = `${percent}%`;
        statusDiv.innerText = `⏳ 合併中... ${percent}%`;
    }

    startBtn.addEventListener('click', async () => {
        if (!videoFile || !srtFile) return;
        startBtn.disabled = true;
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        statusDiv.style.color = '#0f172a';

        const videoIn = 'input' + (videoFile.name.match(/\.\w+$/)[0]);
        const assIn = 'subtitle.ass';
        const videoOut = 'output.mp4';

        try {
            if (!fontLoaded) await loadFont();

            statusDiv.innerText = '📁 載入影片...';
            ffmpeg.FS('writeFile', videoIn, await fetchFile(videoFile));

            statusDiv.innerText = '📄 轉換字幕為 ASS 格式...';
            const srtText = await srtFile.text();
            const assContent = srtToAss(srtText, 'NotoSansTC-Regular.ttf');
            const encoder = new TextEncoder();
            ffmpeg.FS('writeFile', assIn, encoder.encode(assContent));

            statusDiv.innerText = '🎞️ 開始燒錄字幕 (使用 ass filter)...';
            ffmpeg.setProgress(updateProgress);

            // 使用 ass filter 而不是 subtitles，更可靠地載入字型
            await ffmpeg.run(
                '-y',
                '-fflags', '+genpts',
                '-i', videoIn,
                '-vf', `scale=trunc(iw/2)*2:trunc(ih/2)*2,ass=${assIn}`,
                '-vcodec', 'libx264',
                '-acodec', 'aac',
                '-pix_fmt', 'yuv420p',
                '-preset', 'superfast',
                '-b:v', '1500k',
                videoOut
            );

            const stat = ffmpeg.FS('stat', videoOut);
            if (!stat || stat.size === 0) throw new Error('輸出為空');

            statusDiv.innerText = '✅ 完成，準備下載...';
            const data = ffmpeg.FS('readFile', videoOut);
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `[字幕]_${videoFile.name.replace(/\.[^/.]+$/, '')}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            ffmpeg.FS('unlink', videoIn);
            ffmpeg.FS('unlink', assIn);
            ffmpeg.FS('unlink', videoOut);
            statusDiv.innerText = '🎉 成功！請檢查下載的影片是否有雙語字幕。';
        } catch (err) {
            console.error(err);
            statusDiv.innerText = `❌ 失敗：${err.message || '未知錯誤'}`;
            statusDiv.style.color = '#ef4444';
        } finally {
            startBtn.disabled = false;
            progressBar.style.display = 'none';
        }
    });

    videoUploader.addEventListener('change', e => {
        videoFile = e.target.files[0];
        document.getElementById('videoName').innerText = videoFile ? videoFile.name : '未選取';
        checkReady();
    });
    srtUploader.addEventListener('change', e => {
        srtFile = e.target.files[0];
        document.getElementById('srtName').innerText = srtFile ? srtFile.name : '未選取';
        checkReady();
    });
    function checkReady() {
        startBtn.disabled = !(videoFile && srtFile);
        if (startBtn.disabled) startBtn.classList.add('btn-disabled');
        else startBtn.classList.remove('btn-disabled');
    }

    init();
</script>
</body>
</html>
