<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 影片與雙語字幕合併工具 (真正顯示中文)</title>
    
    <!-- 啟用跨域隔離 -->
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #0f172a; font-size: 24px; margin-bottom: 20px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            padding: 12px 20px;
            background-color: #0284c7;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            box-sizing: border-box;
        }
        .btn:hover { background-color: #0369a1; }
        .btn-disabled {
            background-color: #cbd5e1 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
        input[type="file"] { display: none; }
        .file-status { font-size: 13px; color: #64748b; margin-top: -5px; margin-bottom: 5px; }
        #status { margin-top: 25px; font-weight: 600; font-size: 15px; min-height: 40px; white-space: pre-line; }
        .progress-bar {
            width: 100%;
            background-color: #e2e8f0;
            padding: 4px;
            border-radius: 9999px;
            margin-top: 20px;
            display: none;
            box-sizing: border-box;
        }
        .progress-bar-fill {
            display: block;
            height: 12px;
            background-color: #10b981;
            border-radius: 9999px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .warning {
            background-color: #fef9c3;
            border-left: 4px solid #eab308;
            padding: 10px;
            font-size: 13px;
            margin-top: 20px;
            text-align: left;
            color: #854d0e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 影片與雙語字幕合併工具</h1>
    <p>將雙語 SRT 字幕永久燒錄進影片。<br>✅ 本版使用「思源黑體」完整支援中文與英文，確保字幕清晰顯示。</p>
    
    <div class="upload-group">
        <label class="btn" for="videoUploader">📁 1. 選擇影片檔案 (MP4/MKV/MOV)</label>
        <input type="file" id="videoUploader" accept="video/*">
        <div class="file-status" id="videoName">尚未選取影片</div>

        <label class="btn" for="srtUploader">📁 2. 選擇雙語 SRT 字幕檔 (UTF-8)</label>
        <input type="file" id="srtUploader" accept=".srt">
        <div class="file-status" id="srtName">尚未選取字幕</div>
    </div>

    <button class="btn btn-disabled" id="startBtn" disabled style="width: 100%; font-size: 16px;">🚀 開始合併（中文顯示版）</button>

    <div class="progress-bar" id="progressBar">
        <span class="progress-bar-fill" id="progressBarFill"></span>
    </div>

    <div id="status" style="color: #64748b;">網頁載入中，請稍候...</div>
    
    <div class="warning">
        ⚠️ 重要：<br>
        1. 必須透過 <strong>HTTP 伺服器</strong> 執行（如 npx http-server 或 python -m http.server）。<br>
        2. 字幕檔案請使用 <strong>UTF-8 編碼</strong>（無 BOM 最佳）。<br>
        3. 首次使用會自動下載中文字型（約 2MB），請保持網路連線。
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    const videoUploader = document.getElementById('videoUploader');
    const srtUploader = document.getElementById('srtUploader');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressBarFill = document.getElementById('progressBarFill');

    let videoFile = null;
    let srtFile = null;
    let fontLoaded = false;

    async function init() {
        status.innerText = '正在初始化 FFmpeg 核心，請稍候...';
        try {
            await ffmpeg.load();
            status.innerText = '✅ 系統就緒！請選取影片與字幕檔案。';
            status.style.color = '#10b981';
            // 預先下載字型（可選，但為了加快後續處理）
            await preloadFont();
        } catch (e) {
            status.innerText = '❌ 核心載入失敗。\n請確認使用 HTTP 伺服器執行且 coi-serviceworker.js 存在。';
            status.style.color = '#ef4444';
            console.error(e);
        }
    }

    // 預先載入支援中文的字型（思源黑體 Noto Sans CJK TC Regular）
    async function preloadFont() {
        if (fontLoaded) return;
        status.innerText = '📦 正在下載中文字型（約 2MB），稍後可正常顯示中文...';
        try {
            // 使用 fastly CDN 上的 Noto Sans CJK TC 字型 (TrueType 格式)
            const fontUrl = 'https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-tc@5.0.0/files/noto-sans-tc-chinese-traditional-400-normal.woff2';
            // 注意：FFmpeg 需要 TTF 或 OTF，woff2 不支援。改用真正 TTF 來源
            // 以下為穩定可用的開源中文字型（微軟正黑體替代品）－ 使用 Google Noto Sans CJK TTF
            const ttfUrl = 'https://github.com/googlefonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansTC-Regular.otf';
            const response = await fetch(ttfUrl);
            if (!response.ok) throw new Error('字型下載失敗');
            const fontBuffer = await response.arrayBuffer();
            // 寫入 FFmpeg 虛擬檔案系統，命名為 myfont.ttf
            ffmpeg.FS('writeFile', 'myfont.ttf', new Uint8Array(fontBuffer));
            fontLoaded = true;
            status.innerText = '✅ 系統就緒（含中文字型）！請選取影片與字幕。';
        } catch (err) {
            console.warn('字型預載失敗，將嘗試使用內建字型（可能無中文）', err);
            status.innerText = '⚠️ 字型下載失敗，中文可能無法顯示，但仍可嘗試合併。';
        }
    }

    videoUploader.addEventListener('change', (e) => {
        videoFile = e.target.files[0];
        if(videoFile) {
            document.getElementById('videoName').innerText = `已選取: ${videoFile.name}`;
            checkReady();
        }
    });

    srtUploader.addEventListener('change', (e) => {
        srtFile = e.target.files[0];
        if(srtFile) {
            document.getElementById('srtName').innerText = `已選取: ${srtFile.name}`;
            checkReady();
        }
    });

    function checkReady() {
        if (videoFile && srtFile) {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
            startBtn.style.backgroundColor = '#10b981';
        }
    }

    ffmpeg.setProgress(({ ratio }) => {
        const percentage = Math.min(Math.max(Math.round(ratio * 100), 0), 100);
        progressBarFill.style.width = `${percentage}%`;
        status.innerText = `⏳ 正在燒錄雙語字幕... ${percentage}% \n(請保持網頁開啟)`;
        status.style.color = '#0284c7';
    });

    // 確保字幕是 UTF-8 並移除 BOM
    async function normalizeSrtContent(file) {
        const text = await file.text();
        if (text.charCodeAt(0) === 0xFEFF) {
            return text.slice(1);
        }
        return text;
    }

    startBtn.addEventListener('click', async () => {
        if (!videoFile || !srtFile) return;

        startBtn.disabled = true;
        startBtn.classList.add('btn-disabled');
        progressBar.style.display = 'block';
        progressBarFill.style.width = '0%';
        status.style.color = '#0f172a';

        const videoExt = videoFile.name.substring(videoFile.name.lastIndexOf('.'));
        const videoIn = `input${videoExt}`;
        const srtIn = 'subtitles.srt';
        const videoOut = 'output_with_subtitles.mp4';

        try {
            // 1. 確認字型已載入，若未載入則現在載入
            if (!fontLoaded) {
                status.innerText = '📦 載入中文字型，請稍候...';
                await preloadFont();
            }

            // 2. 寫入影片
            status.innerText = '📂 載入影片檔...';
            ffmpeg.FS('writeFile', videoIn, await fetchFile(videoFile));

            // 3. 寫入字幕（轉為 UTF-8）
            status.innerText = '📄 處理字幕編碼...';
            let srtContent = await normalizeSrtContent(srtFile);
            const encoder = new TextEncoder();
            ffmpeg.FS('writeFile', srtIn, encoder.encode(srtContent));

            status.innerText = '🎞️ 開始合併 (使用中文字型渲染)...';

            // 4. 執行 FFmpeg，關鍵修正：
            //    - 使用 fontfile=myfont.ttf 明確指定中文字型
            //    - 注意 fontfile 值「不加引號」
            //    - force_style 內使用英數字與逗號即可，避免特殊字元
            await ffmpeg.run(
                '-y',
                '-fflags', '+genpts',
                '-i', videoIn,
                '-vf', `scale=trunc(iw/2)*2:trunc(ih/2)*2,subtitles=${srtIn}:fontsdir=.:fontfile=myfont.ttf:force_style='FontSize=20,Outline=2,BorderStyle=1'`,
                '-vcodec', 'libx264',
                '-acodec', 'aac',
                '-pix_fmt', 'yuv420p',
                '-preset', 'superfast',
                '-b:v', '1500k',
                videoOut
            );

            // 5. 檢查輸出
            const stat = ffmpeg.FS('stat', videoOut);
            if (!stat || stat.size === 0) throw new Error('輸出檔案為空，可能是字型或 filter 錯誤');

            status.innerText = '✅ 字幕燒錄完成！準備下載...';
            status.style.color = '#10b981';

            // 6. 下載
            const data = ffmpeg.FS('readFile', videoOut);
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const baseName = videoFile.name.substring(0, videoFile.name.lastIndexOf('.')) || 'output';
            a.download = `[帶字幕]_${baseName}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // 7. 清理
            ffmpeg.FS('unlink', videoIn);
            ffmpeg.FS('unlink', srtIn);
            ffmpeg.FS('unlink', videoOut);
            // 保留字型檔案供下次使用，不刪除

            status.innerText = '🎉 合併成功！影片已下載，請確認字幕是否正常顯示。';
        } catch (err) {
            console.error(err);
            status.innerText = `❌ 失敗：${err.message || '未知錯誤'}\n嘗試重新整理頁面或使用較短的影片。`;
            status.style.color = '#ef4444';
        } finally {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
            setTimeout(() => {
                if (status.innerText.includes('成功') || status.innerText.includes('失敗')) {
                    progressBar.style.display = 'none';
                }
            }, 2000);
        }
    });

    init();
</script>

</body>
</html>
