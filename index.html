<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 影片與雙語字幕合併工具 (網頁版)</title>
    
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
            background-color: #f1f5f9;
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #0f172a; font-size: 24px; margin-bottom: 20px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            padding: 12px 20px;
            background-color: #0284c7;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            box-sizing: border-box;
        }
        .btn:hover { background-color: #0369a1; }
        .btn-disabled {
            background-color: #cbd5e1 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
        input[type="file"] { display: none; }
        .file-status { font-size: 13px; color: #64748b; margin-top: -5px; margin-bottom: 5px; }
        #status { margin-top: 25px; font-weight: 600; font-size: 15px; min-height: 40px; white-space: pre-line; }
        .progress-bar {
            width: 100%;
            background-color: #e2e8f0;
            padding: 4px;
            border-radius: 9999px;
            margin-top: 20px;
            display: none;
            box-sizing: border-box;
        }
        .progress-bar-fill {
            display: block;
            height: 12px;
            background-color: #10b981;
            border-radius: 9999px;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 影片與雙語字幕合併工具</h1>
    <p>將雙語 SRT 字幕永久燒錄進影片中。所有壓制過程皆在瀏覽器本地完成，不消耗任何上傳流量，保護影片隱私！</p>
    
    <div class="upload-group">
        <label class="btn" for="videoUploader">📁 1. 選擇影片檔案 (MP4/MKV/MOV)</label>
        <input type="file" id="videoUploader" accept="video/*">
        <div class="file-status" id="videoName">尚未選取影片</div>

        <label class="btn" for="srtUploader">📁 2. 選擇雙語 SRT 字幕檔</label>
        <input type="file" id="srtUploader" accept=".srt">
        <div class="file-status" id="srtName">尚未選取字幕</div>
    </div>

    <button class="btn btn-disabled" id="startBtn" disabled style="width: 100%; font-size: 16px;">🚀 開始合併（燒錄字幕）</button>

    <div class="progress-bar" id="progressBar">
        <span class="progress-bar-fill" id="progressBarFill"></span>
    </div>

    <div id="status" style="color: #64748b;">網頁載入中，請稍候...</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false });

    const videoUploader = document.getElementById('videoUploader');
    const srtUploader = document.getElementById('srtUploader');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressBarFill = document.getElementById('progressBarFill');

    let videoFile = null;
    let srtFile = null;

    async function init() {
        status.innerText = '正在初始化 FFmpeg 核心，請稍候...';
        try {
            await ffmpeg.load();
            status.innerText = '✅ 系統就緒！請先選取影片與字幕檔案。';
            status.style.color = '#10b981';
        } catch (e) {
            status.innerText = '❌ 核心載入失敗。\n請確保 coi-serviceworker.js 已成功上傳到 GitHub，並試著清除快取再試一次。';
            status.style.color = '#ef4444';
            console.error(e);
        }
    }

    videoUploader.addEventListener('change', (e) => {
        videoFile = e.target.files[0];
        if(videoFile) {
            document.getElementById('videoName').innerText = `已選取: ${videoFile.name}`;
            checkReady();
        }
    });

    srtUploader.addEventListener('change', (e) => {
        srtFile = e.target.files[0];
        if(srtFile) {
            document.getElementById('srtName').innerText = `已選取: ${srtFile.name}`;
            checkReady();
        }
    });

    function checkReady() {
        if (videoFile && srtFile) {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
            startBtn.style.backgroundColor = '#10b981';
        }
    }

    ffmpeg.setProgress(({ ratio }) => {
        const percentage = Math.min(Math.max(Math.round(ratio * 100), 0), 100);
        progressBarFill.style.width = `${percentage}%`;
        status.innerText = `⏳ 正在努力壓制字幕中... ${percentage}% \n(請勿關閉網頁，影片越大需要越久時間)`;
        status.style.color = '#0284c7';
    });

    startBtn.addEventListener('click', async () => {
        if (!videoFile || !srtFile) return;

        startBtn.disabled = true;
        startBtn.classList.add('btn-disabled');
        progressBar.style.display = 'block';
        progressBarFill.style.width = '0%';
        status.innerText = '正在載入檔案並設定字型系統...';
        status.style.color = '#0f172a';

        const videoIn = 'input' + videoFile.name.substring(videoFile.name.lastIndexOf('.'));
        const srtIn = 'subtitles.srt';
        const videoOut = 'output_with_subtitles.mp4';

        try {
            ffmpeg.FS('writeFile', videoIn, await fetchFile(videoFile));
            ffmpeg.FS('writeFile', srtIn, await fetchFile(srtFile));

            status.innerText = '⏳ 初始化壓制引擎（大影片可能需要較長時間處理）...';

            await ffmpeg.run(
                '-i', videoIn,
                '-vf', `subtitles=${srtIn}:force_style='FontSize=20,Outline=2,PrimaryColour=&HFFFFFF,BorderStyle=1'`,
                '-preset', 'ultrafast', 
                '-c:a', 'copy', 
                videoOut
            );

            status.innerText = '🎉 字幕燒錄完成！正在準備下載影片...';
            status.style.color = '#10b981';

            const data = ftmp.FS('readFile', videoOut);
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `[帶字幕]_${videoFile.name.substring(0, videoFile.name.lastIndexOf('.'))}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            ffmpeg.FS('unlink', videoIn);
            ffmpeg.FS('unlink', srtIn);
            ffmpeg.FS('unlink', videoOut);

            status.innerText = '✅ 字幕合併成功！影片已自動下載。';
        } catch (err) {
            status.innerText = '❌ 壓制失敗。原因可能是：影片過大導致瀏覽器記憶體崩潰，或格式不相容。';
            status.style.color = '#ef4444';
            console.error(err);
        } finally {
            startBtn.disabled = false;
            startBtn.classList.remove('btn-disabled');
        }
    });

    init();
</script>

</body>
</html>

    init();
</script>

</body>
</html>
