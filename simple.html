<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>極簡字幕合併測試</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>
    <input type="file" id="video" accept="video/*"><br>
    <input type="file" id="srt" accept=".srt"><br>
    <button id="start">合併</button>
    <div id="status"></div>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        let videoFile, srtFile;

        document.getElementById('video').onchange = e => videoFile = e.target.files[0];
        document.getElementById('srt').onchange = e => srtFile = e.target.files[0];
        document.getElementById('start').onclick = async () => {
            if (!videoFile || !srtFile) return;
            document.getElementById('status').innerText = '載入中...';
            await ffmpeg.load();
            
            // 寫入影片
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));
            // 寫入字幕 (強制轉 UTF-8)
            let srtContent = await srtFile.text();
            if (srtContent.charCodeAt(0) === 0xFEFF) srtContent = srtContent.slice(1);
            ffmpeg.FS('writeFile', 'sub.srt', new TextEncoder().encode(srtContent));
            
            document.getElementById('status').innerText = '合併中...';
            await ffmpeg.run(
                '-y', '-i', 'input.mp4',
                '-vf', 'subtitles=sub.srt',
                '-c:v', 'libx264', '-preset', 'superfast', '-c:a', 'copy',
                'output.mp4'
            );
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'output.mp4';
            a.click();
            document.getElementById('status').innerText = '完成！';
        };
    </script>
</body>
</html>
